<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PDF Trimmer</title>
  <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f5f7;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .card {
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 40px 44px;
      width: 100%;
      max-width: 480px;
    }

    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      margin-bottom: 4px;
      color: #1d1d1f;
    }

    .subtitle {
      font-size: 0.9rem;
      color: #6e6e73;
      margin-bottom: 32px;
    }

    /* Drop zone */
    .drop-zone {
      border: 2px dashed #c7c7cc;
      border-radius: 12px;
      padding: 32px 16px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
      margin-bottom: 28px;
    }

    .drop-zone.drag-over {
      border-color: #0071e3;
      background: #f0f6ff;
    }

    .drop-zone input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .drop-icon {
      font-size: 2.2rem;
      margin-bottom: 8px;
    }

    .drop-label {
      font-size: 0.95rem;
      color: #3a3a3c;
      font-weight: 500;
    }

    .drop-hint {
      font-size: 0.8rem;
      color: #8e8e93;
      margin-top: 4px;
    }

    .file-name {
      font-size: 0.85rem;
      color: #0071e3;
      margin-top: 8px;
      font-weight: 500;
      word-break: break-all;
    }

    /* Page count badge */
    .page-count {
      display: none;
      font-size: 0.8rem;
      color: #6e6e73;
      background: #f5f5f7;
      border-radius: 6px;
      padding: 4px 10px;
      margin-top: 8px;
      display: inline-block;
    }

    /* Range inputs */
    .range-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-bottom: 28px;
    }

    .field label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: #3a3a3c;
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .field input[type="number"] {
      width: 100%;
      border: 1.5px solid #d1d1d6;
      border-radius: 10px;
      padding: 11px 14px;
      font-size: 1rem;
      color: #1d1d1f;
      outline: none;
      transition: border-color 0.2s;
      appearance: none;
    }

    .field input[type="number"]:focus {
      border-color: #0071e3;
    }

    .field input[type="text"] {
      width: 100%;
      border: 1.5px solid #d1d1d6;
      border-radius: 10px;
      padding: 11px 14px;
      font-size: 1rem;
      color: #1d1d1f;
      outline: none;
      transition: border-color 0.2s;
    }

    .field input[type="text"]:focus {
      border-color: #0071e3;
    }

    .field .suffix {
      font-size: 0.78rem;
      color: #8e8e93;
      margin-top: 4px;
    }

    /* Button */
    button#extractBtn {
      width: 100%;
      background: #0071e3;
      color: #fff;
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, opacity 0.2s;
    }

    button#extractBtn:hover:not(:disabled) {
      background: #0077ed;
    }

    button#extractBtn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    /* Status / error */
    .status {
      margin-top: 16px;
      font-size: 0.88rem;
      text-align: center;
      min-height: 20px;
      font-weight: 500;
    }

    .status.error { color: #ff3b30; }
    .status.success { color: #34c759; }
    .status.info { color: #6e6e73; }
  </style>
</head>
<body>
  <div class="card">
    <h1>PDF Trimmer</h1>
    <p class="subtitle">Extract a page range from any PDF — runs entirely in your browser.</p>

    <div class="drop-zone" id="dropZone">
      <input type="file" id="fileInput" accept="application/pdf" />
      <div class="drop-icon">📄</div>
      <div class="drop-label">Drop a PDF here or click to upload</div>
      <div class="drop-hint">Your file never leaves your device</div>
      <div class="file-name" id="fileName"></div>
    </div>

    <div class="range-row">
      <div class="field">
        <label for="startPage">Start Page</label>
        <input type="number" id="startPage" min="1" placeholder="1" />
      </div>
      <div class="field">
        <label for="endPage">End Page</label>
        <input type="number" id="endPage" min="1" placeholder="—" />
      </div>
    </div>

    <div class="field" style="margin-bottom: 28px;">
      <label for="outputName">Output File Name</label>
      <input type="text" id="outputName" placeholder="trimmed" />
      <div class="suffix">.pdf will be appended automatically</div>
    </div>

    <button id="extractBtn" disabled>Extract Pages</button>
    <div class="status info" id="status"></div>
  </div>

  <script>
    const { PDFDocument } = PDFLib;

    let pdfBytes = null;
    let totalPages = 0;

    const dropZone = document.getElementById('dropZone');
    const fileInput = document.getElementById('fileInput');
    const fileNameEl = document.getElementById('fileName');
    const startPageEl = document.getElementById('startPage');
    const endPageEl = document.getElementById('endPage');
    const extractBtn = document.getElementById('extractBtn');
    const statusEl = document.getElementById('status');

    function setStatus(msg, type = 'info') {
      statusEl.textContent = msg;
      statusEl.className = 'status ' + type;
    }

    function updateBtn() {
      extractBtn.disabled = !pdfBytes;
    }

    async function loadFile(file) {
      if (!file || file.type !== 'application/pdf') {
        setStatus('Please upload a valid PDF file.', 'error');
        return;
      }
      const buffer = await file.arrayBuffer();
      pdfBytes = new Uint8Array(buffer);

      try {
        const doc = await PDFDocument.load(pdfBytes);
        totalPages = doc.getPageCount();
        fileNameEl.textContent = file.name;
        endPageEl.placeholder = totalPages;
        endPageEl.max = totalPages;
        startPageEl.max = totalPages;
        setStatus(`Loaded — ${totalPages} page${totalPages !== 1 ? 's' : ''}`, 'info');
        updateBtn();
      } catch {
        setStatus('Could not read this PDF. Is it password-protected?', 'error');
        pdfBytes = null;
        updateBtn();
      }
    }

    fileInput.addEventListener('change', e => {
      if (e.target.files[0]) loadFile(e.target.files[0]);
    });

    dropZone.addEventListener('dragover', e => {
      e.preventDefault();
      dropZone.classList.add('drag-over');
    });

    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));

    dropZone.addEventListener('drop', e => {
      e.preventDefault();
      dropZone.classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      if (file) loadFile(file);
    });

    extractBtn.addEventListener('click', async () => {
      if (!pdfBytes) return;

      const start = parseInt(startPageEl.value) || 1;
      const end = parseInt(endPageEl.value) || totalPages;

      if (start < 1 || end < 1 || start > end) {
        setStatus('Invalid page range. Start must be ≤ End.', 'error');
        return;
      }
      if (end > totalPages) {
        setStatus(`This PDF only has ${totalPages} pages.`, 'error');
        return;
      }

      setStatus('Extracting…', 'info');
      extractBtn.disabled = true;

      try {
        const srcDoc = await PDFDocument.load(pdfBytes);
        const newDoc = await PDFDocument.create();
        const indices = [];
        for (let i = start - 1; i <= end - 1; i++) indices.push(i);

        const copied = await newDoc.copyPages(srcDoc, indices);
        copied.forEach(p => newDoc.addPage(p));

        const outBytes = await newDoc.save();
        const blob = new Blob([outBytes], { type: 'application/pdf' });
        const url = URL.createObjectURL(blob);

        const a = document.createElement('a');
        a.href = url;
        const name = document.getElementById('outputName').value.trim() || 'trimmed';
        a.download = `${name}.pdf`;
        a.click();
        URL.revokeObjectURL(url);

        setStatus(`Done — pages ${start}–${end} downloaded.`, 'success');
      } catch (err) {
        setStatus('Something went wrong: ' + err.message, 'error');
      } finally {
        extractBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
